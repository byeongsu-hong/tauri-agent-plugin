name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check

  package-smoke:
    name: npm pack smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      # Pack the tarball and confirm the published entry points actually exist.
      - run: npm pack --dry-run
      - run: |
          npm pack
          tar -tzf byeongsu-hong-tauri-plugin-agent-*.tgz > files.txt
          for f in package/dist-js/index.js package/dist-cli/tauri-agent.js package/dist-cli/tauri-agent-mcp.js package/LICENSE-MIT package/LICENSE-APACHE; do
            grep -qx "$f" files.txt || { echo "missing from tarball: $f"; exit 1; }
          done

  rust:
    name: Rust check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      # The default build compiles the Wry feature. Run it where the hosted
      # runtime loader is usable, then exercise the CEF feature without Wry on
      # every platform (including Windows, whose runner cannot load WebView2 in
      # a unit-test process: STATUS_ENTRYPOINT_NOT_FOUND).
      - if: runner.os != 'Windows'
        run: cargo test
      - run: cargo test --no-default-features --features cef

  e2e:
    name: Fixture self-test (webkit2gtk under xvfb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb
      # Build the plugin JS the fixture links via file:../.., then the fixture.
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Build the fixture app
        working-directory: examples/fixture-app
        run: |
          bun install
          bun run tauri:build -- --no-bundle
      - name: Run the in-webview bridge self-test
        run: |
          bin="examples/fixture-app/src-tauri/target/release/tauri-agent-fixture"
          test -x "$bin" || { echo "fixture binary not found at $bin"; ls -la examples/fixture-app/src-tauri/target/release; exit 1; }
          TAURI_AGENT_SELF_TEST=1 xvfb-run -a "$bin"
          echo "fixture self-test passed"
