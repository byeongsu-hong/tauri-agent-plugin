"$schema" = "schemas/schema.json"

[default]
description = "Allows the dev-only Tauri Agent bridge commands for compact semantic trees, ref inspection, JavaScript eval, ref actions, hover, focus, blur, scroll, and drag events, select controls, checked controls, screenshots, event streams, and window discovery."
permissions = [
  "allow-agent-bridge-response",
  "allow-agent-attach",
  "allow-agent-snapshot",
  "allow-agent-action",
  "allow-agent-inspect",
  "allow-agent-eval",
  "allow-agent-select",
  "allow-agent-check",
  "allow-agent-hover",
  "allow-agent-focus",
  "allow-agent-blur",
  "allow-agent-scroll",
  "allow-agent-drag",
  "allow-agent-screenshot",
  "allow-agent-logs",
  "allow-agent-events",
  "allow-agent-windows",
  "allow-agent-wait",
  "allow-agent-state",
  "allow-agent-record",
]
