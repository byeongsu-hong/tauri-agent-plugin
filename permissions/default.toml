"$schema" = "schemas/schema.json"

[default]
description = "Allows the dev-only Tauri Agent bridge commands for compact semantic trees, ref inspection, ref actions, screenshots, event streams, and window discovery."
permissions = [
  "allow-agent-bridge-response",
  "allow-agent-attach",
  "allow-agent-snapshot",
  "allow-agent-action",
  "allow-agent-inspect",
  "allow-agent-screenshot",
  "allow-agent-logs",
  "allow-agent-events",
  "allow-agent-windows",
  "allow-agent-wait",
  "allow-agent-state",
  "allow-agent-record",
]
